<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Syed Shan Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Vanta.js & Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta/dist/vanta.waves.min.js"></script>

    <!-- Bootstrap Icons (for social links) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: #000;
            /* fallback background */
        }

        #hero {
            position: relative;
            width: 100%;
            height: 100vh;
            color: white;
            background-color: #000;
            /* ensures black base */
        }

        .overlay-itro {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            /* optional dark overlay */
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        .hero-title {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .hero-subtitle {
            font-size: 1.5rem;
        }

        .social-links {
            margin-top: 1.5rem;
        }

        .social-links a {
            color: white;
            font-size: 1.5rem;
            margin: 0 10px;
            transition: transform 0.2s;
        }

        .social-links a:hover {
            transform: scale(1.2);
        }
    </style>
</head>

<body>

    <!-- Hero Section with Vanta Background -->
    <div id="hero">
        <div class="overlay-itro"></div>
        <div class="hero-content">
            <h1 class="hero-title">Syed Shan</h1>
            <p class="hero-subtitle">Designer • Freelancer • Developer</p>
            <div class="social-links">
                <a href="https://www.instagram.com/syed_shan46/" class="instagram"><i class="bi bi-instagram"></i></a>
                <a href="https://github.com/Syed-shan46" class="github"><i class="bi bi-github"></i></a>
                <a href="https://wa.me/9747304599" class="whatsapp"><i class="bi bi-whatsapp"></i></a>
            </div>
        </div>
    </div>

    <!-- Vanta.js Init Script -->
    <script>
        VANTA.WAVES({
            el: "#hero",
            color: 0x111111,       // darker wave color
            shininess: 50,
            waveHeight: 25,
            waveSpeed: 1.0,
            zoom: 1
        });
    </script>

</body>

</html>
