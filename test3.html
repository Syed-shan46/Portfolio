<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Syed Shan Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons for social -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at 20% 20%, #111111, #000000);
            color: white;
            overflow: hidden;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            padding: 2rem;
            animation: fadeIn 2s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .hero h1 {
            font-size: 3.5rem;
            background: linear-gradient(90deg, #00d2ff, #3a47d5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: slideIn 1.5s ease-out forwards;
            transform: translateY(30px);
            opacity: 0;
        }

        .hero p {
            font-size: 1.2rem;
            margin-top: 1rem;
            color: #bbb;
            animation: slideIn 2s ease-out forwards;
            animation-delay: 0.5s;
            transform: translateY(30px);
            opacity: 0;
        }

        @keyframes slideIn {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .social-links {
            margin-top: 2rem;
            display: flex;
            gap: 1.5rem;
            animation: fadeIn 2s ease-in forwards;
            animation-delay: 1s;
            opacity: 0;
        }

        .social-links a {
            color: white;
            font-size: 1.8rem;
            transition: transform 0.3s ease, color 0.3s;
        }

        .social-links a:hover {
            color: #00d2ff;
            transform: scale(1.2);
        }

        .floating-circles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .circle {
            position: absolute;
            width: 150px;
            height: 150px;
            background: #00d2ff33;
            border-radius: 50%;
            animation: float 10s infinite ease-in-out;
        }

        .circle:nth-child(1) {
            top: 10%;
            left: 20%;
            animation-delay: 0s;
        }

        .circle:nth-child(2) {
            bottom: 10%;
            right: 25%;
            animation-delay: 3s;
            width: 200px;
            height: 200px;
            background: #3a47d533;
        }

        .circle:nth-child(3) {
            top: 40%;
            left: 75%;
            animation-delay: 5s;
            background: #ffffff11;
        }

        @keyframes float {
            0% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-30px) scale(1.1);
            }

            100% {
                transform: translateY(0) scale(1);
            }
        }
    </style>
</head>

<body>

    <div class="floating-circles">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <div class="hero">
        <h1>Syed Shan</h1>
        <p>Designer • Developer • Freelancer</p>
        <div class="social-links">
            <a href="https://www.instagram.com/syed_shan46/" target="_blank"><i class="bi bi-instagram"></i></a>
            <a href="https://github.com/Syed-shan46" target="_blank"><i class="bi bi-github"></i></a>
            <a href="https://wa.me/9747304599" target="_blank"><i class="bi bi-whatsapp"></i></a>
        </div>
    </div>

</body>

</html>
