<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Syed Shan - Video Hero</title>

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">


</head>

<body>

    <!-- Hero container -->
    <div class="hero">
        <!-- Video background inside hero -->
        <video class="video-bg" autoplay muted loop playsinline>
            <source src="877-141149926.mp4" type="video/mp4" />
            Your browser does not support the video tag.
        </video>

        <!-- Hero content inside hero -->
        <div class="hero-content display-table">
            <div class="table-cell">
                <div class="container">
                    <h1 class="hero-title mb-4">Syed Shan</h1>
                    <p class="hero-subtitle">
                        <span class="typed" data-typed-items="Designer,Freelancer,Developer"></span>
                    </p>
                    <div class="social-links">
                        <a href="https://www.instagram.com/syed_shan46/" class="instagram"><i
                                class="bi bi-instagram"></i></a>
                        <a href="https://github.com/Syed-shan46" class="google-plus"><i class="bi bi-github"></i></a>
                        <a href="https://wa.me/9747304599" class="whatsapp"><i class="bi bi-whatsapp"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="screenshot-container" style="
    margin: 2rem auto;
    max-width: 340px;
    border-radius: 20px;
    background: linear-gradient(to bottom right, #2d2d2d, #1a1a1a);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    padding: 16px;
    text-align: center;
">
        <img src="assets/img/test1.webp" alt="Project Preview" style="
        width: 100%;
        border-radius: 12px;
        border: 1px solid #888;
    ">

        <!-- Typed.js script -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.10/typed.min.js"></script>

        <script>
            const typed = document.querySelector('.typed');
            if (typed) {
                let typed_strings = typed.getAttribute('data-typed-items');
                typed_strings = typed_strings.split(',');
                new Typed('.typed', {
                    strings: typed_strings,
                    loop: true,
                    typeSpeed: 100,
                    backSpeed: 50,
                    backDelay: 2000
                });
            }
        </script>

        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const video = document.querySelector(".video-bg");
                if (video) {
                    video.playbackRate = 0.5; // 0.5 means half speed; 1 is normal
                }
            });
        </script>


        <script src="https://cdnjs.cloudflare.com/ajax/libs/waypoints/4.0.1/noframework.waypoints.min.js"></script>

</body>

</html>
